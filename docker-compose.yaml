services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kupipodariday-backend:latest
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: database
      PORT: 3000
    ports:
      - "127.0.0.1:4000:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_network
      - backend_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000}
    image: kupipodariday-frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    networks:
      - app_network

  database:
    image: postgres:13
    container_name: database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${POSTGRES_PGDATA:-/var/lib/postgresql/data}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_internal

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
  backend_internal:
    driver: bridge